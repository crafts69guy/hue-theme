# Generated by scripts/build.ts. Do not edit.
# Huế Cung — Hue theme for tmux. Source this from tmux.conf.

# Copy mode + messages
set -g mode-style "fg=#28251F,bg=#71644C"
set -g message-style "fg=#28251F,bg=#E8DDC5"
set -g message-command-style "fg=#28251F,bg=#E8DDC5"

# Panes
set -g pane-border-style "fg=#71644C"
set -g pane-active-border-style "fg=#356B5C"
set -g display-panes-active-colour "#356B5C"
set -g display-panes-colour "#585347"
setw -g clock-mode-colour "#356B5C"

# Status bar
set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#585347,bg=#E8DDC5"
set -g status-bg "#F3ECD9"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#F3ECD9,bg=#356B5C,bold] #S:#I.#P #[fg=#356B5C,bg=#71644C,nobold,nounderscore,noitalics]#[fg=#28251F,bg=#71644C,bold] #(whoami) #[fg=#71644C,bg=#F3ECD9,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#71644C,bg=#F3ECD9,nobold,nounderscore,noitalics]#[fg=#585347,bg=#71644C] #[fg=#634F75,bg=#71644C,nobold,nounderscore,noitalics]#[fg=#F3ECD9,bg=#634F75,bold] #h "

# Window list
setw -g window-status-activity-style "underscore,fg=#585347,bg=#F3ECD9"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#585347,bg=#F3ECD9"
setw -g window-status-format "#[fg=#F3ECD9,bg=#F3ECD9]#[default] #I  #{b:pane_current_path} #[fg=#F3ECD9,bg=#F3ECD9,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#F3ECD9,bg=#E8DDC5]#[fg=#356B5C,bg=#E8DDC5] #I #[fg=#F3ECD9,bg=#356B5C] #{b:pane_current_path} #[fg=#356B5C,bg=#F3ECD9,nobold,nounderscore,noitalics]"
