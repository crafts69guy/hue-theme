# Generated by scripts/build.ts. Do not edit.
# Huế Hương — Hue theme for tmux. Source this from tmux.conf.

# Copy mode + messages
set -g mode-style "fg=#EBE9DC,bg=#52695F"
set -g message-style "fg=#EBE9DC,bg=#16231F"
set -g message-command-style "fg=#EBE9DC,bg=#16231F"

# Panes
set -g pane-border-style "fg=#52695F"
set -g pane-active-border-style "fg=#82B9A2"
set -g display-panes-active-colour "#82B9A2"
set -g display-panes-colour "#AFB7A8"
setw -g clock-mode-colour "#82B9A2"

# Status bar
set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#AFB7A8,bg=#16231F"
set -g status-bg "#101816"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#101816,bg=#82B9A2,bold] #S:#I.#P #[fg=#82B9A2,bg=#52695F,nobold,nounderscore,noitalics]#[fg=#EBE9DC,bg=#52695F,bold] #(whoami) #[fg=#52695F,bg=#101816,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#52695F,bg=#101816,nobold,nounderscore,noitalics]#[fg=#AFB7A8,bg=#52695F] #[fg=#A79BBC,bg=#52695F,nobold,nounderscore,noitalics]#[fg=#101816,bg=#A79BBC,bold] #h "

# Window list
setw -g window-status-activity-style "underscore,fg=#AFB7A8,bg=#101816"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#AFB7A8,bg=#101816"
setw -g window-status-format "#[fg=#101816,bg=#101816]#[default] #I  #{b:pane_current_path} #[fg=#101816,bg=#101816,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#101816,bg=#16231F]#[fg=#82B9A2,bg=#16231F] #I #[fg=#101816,bg=#82B9A2] #{b:pane_current_path} #[fg=#82B9A2,bg=#101816,nobold,nounderscore,noitalics]"
