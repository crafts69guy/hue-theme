# Generated by scripts/build.ts. Do not edit.
# Huế Mưa — Hue theme for tmux. Source this from tmux.conf.

# Copy mode + messages
set -g mode-style "fg=#EDE9DF,bg=#566565"
set -g message-style "fg=#EDE9DF,bg=#151B1C"
set -g message-command-style "fg=#EDE9DF,bg=#151B1C"

# Panes
set -g pane-border-style "fg=#566565"
set -g pane-active-border-style "fg=#79B49A"
set -g display-panes-active-colour "#79B49A"
set -g display-panes-colour "#B7B7AD"
setw -g clock-mode-colour "#79B49A"

# Status bar
set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#B7B7AD,bg=#151B1C"
set -g status-bg "#0F1313"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#0F1313,bg=#79B49A,bold] #S:#I.#P #[fg=#79B49A,bg=#566565,nobold,nounderscore,noitalics]#[fg=#EDE9DF,bg=#566565,bold] #(whoami) #[fg=#566565,bg=#0F1313,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#566565,bg=#0F1313,nobold,nounderscore,noitalics]#[fg=#B7B7AD,bg=#566565] #[fg=#B5A2CA,bg=#566565,nobold,nounderscore,noitalics]#[fg=#0F1313,bg=#B5A2CA,bold] #h "

# Window list
setw -g window-status-activity-style "underscore,fg=#B7B7AD,bg=#0F1313"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#B7B7AD,bg=#0F1313"
setw -g window-status-format "#[fg=#0F1313,bg=#0F1313]#[default] #I  #{b:pane_current_path} #[fg=#0F1313,bg=#0F1313,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#0F1313,bg=#151B1C]#[fg=#79B49A,bg=#151B1C] #I #[fg=#0F1313,bg=#79B49A] #{b:pane_current_path} #[fg=#79B49A,bg=#0F1313,nobold,nounderscore,noitalics]"
