# Generated by scripts/build.ts. Do not edit.
# Huế Mưa — Hue theme for tmux. Source this from tmux.conf.

# Copy mode + messages
set -g mode-style "fg=#CFCCC2,bg=#2D4640"
set -g message-style "fg=#CFCCC2,bg=#23282A"
set -g message-command-style "fg=#CFCCC2,bg=#23282A"

# Panes
set -g pane-border-style "fg=#5B6F69"
set -g pane-active-border-style "fg=#7FB89C"
set -g display-panes-active-colour "#7FB89C"
set -g display-panes-colour "#9DA39E"
setw -g clock-mode-colour "#7FB89C"

# Status bar
set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#9DA39E,bg=#23282A"
set -g status-bg "#15191B"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#15191B,bg=#7FB89C,bold] #S:#I.#P #[fg=#7FB89C,bg=#2D4640,nobold,nounderscore,noitalics]#[fg=#CFCCC2,bg=#2D4640,bold] #(whoami) #[fg=#2D4640,bg=#15191B,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#2D4640,bg=#15191B,nobold,nounderscore,noitalics]#[fg=#9DA39E,bg=#2D4640] #[fg=#AFA3CE,bg=#2D4640,nobold,nounderscore,noitalics]#[fg=#15191B,bg=#AFA3CE,bold] #h "

# Window list
setw -g window-status-activity-style "underscore,fg=#9DA39E,bg=#15191B"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#9DA39E,bg=#15191B"
setw -g window-status-format "#[fg=#15191B,bg=#15191B]#[default] #I  #{b:pane_current_path} #[fg=#15191B,bg=#15191B,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#15191B,bg=#23282A]#[fg=#7FB89C,bg=#23282A] #I #[fg=#15191B,bg=#7FB89C] #{b:pane_current_path} #[fg=#7FB89C,bg=#15191B,nobold,nounderscore,noitalics]"
