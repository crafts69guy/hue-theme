# Generated by scripts/build.ts. Do not edit.
# Huế Hương — Hue theme for tmux. Source this from tmux.conf.

# Copy mode + messages
set -g mode-style "fg=#D6DAD0,bg=#244E42"
set -g message-style "fg=#D6DAD0,bg=#182A24"
set -g message-command-style "fg=#D6DAD0,bg=#182A24"

# Panes
set -g pane-border-style "fg=#587168"
set -g pane-active-border-style "fg=#6FD0A8"
set -g display-panes-active-colour "#6FD0A8"
set -g display-panes-colour "#98A59C"
setw -g clock-mode-colour "#6FD0A8"

# Status bar
set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#98A59C,bg=#182A24"
set -g status-bg "#0F1D19"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#0F1D19,bg=#6FD0A8,bold] #S:#I.#P #[fg=#6FD0A8,bg=#244E42,nobold,nounderscore,noitalics]#[fg=#D6DAD0,bg=#244E42,bold] #(whoami) #[fg=#244E42,bg=#0F1D19,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#244E42,bg=#0F1D19,nobold,nounderscore,noitalics]#[fg=#98A59C,bg=#244E42] #[fg=#A9A0C8,bg=#244E42,nobold,nounderscore,noitalics]#[fg=#0F1D19,bg=#A9A0C8,bold] #h "

# Window list
setw -g window-status-activity-style "underscore,fg=#98A59C,bg=#0F1D19"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#98A59C,bg=#0F1D19"
setw -g window-status-format "#[fg=#0F1D19,bg=#0F1D19]#[default] #I  #{b:pane_current_path} #[fg=#0F1D19,bg=#0F1D19,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#0F1D19,bg=#182A24]#[fg=#6FD0A8,bg=#182A24] #I #[fg=#0F1D19,bg=#6FD0A8] #{b:pane_current_path} #[fg=#6FD0A8,bg=#0F1D19,nobold,nounderscore,noitalics]"
