# Generated by scripts/build.ts. Do not edit.
# Huế Cung — Hue theme for tmux. Source this from tmux.conf.

# Copy mode + messages
set -g mode-style "fg=#3C372C,bg=#CBDDD2"
set -g message-style "fg=#3C372C,bg=#E8DDC5"
set -g message-command-style "fg=#3C372C,bg=#E8DDC5"

# Panes
set -g pane-border-style "fg=#8C846F"
set -g pane-active-border-style "fg=#3A6E5F"
set -g display-panes-active-colour "#3A6E5F"
set -g display-panes-colour "#66604F"
setw -g clock-mode-colour "#3A6E5F"

# Status bar
set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#66604F,bg=#E8DDC5"
set -g status-bg "#F3ECD9"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#F3ECD9,bg=#3A6E5F,bold] #S:#I.#P #[fg=#3A6E5F,bg=#CBDDD2,nobold,nounderscore,noitalics]#[fg=#3C372C,bg=#CBDDD2,bold] #(whoami) #[fg=#CBDDD2,bg=#F3ECD9,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#CBDDD2,bg=#F3ECD9,nobold,nounderscore,noitalics]#[fg=#66604F,bg=#CBDDD2] #[fg=#6A5384,bg=#CBDDD2,nobold,nounderscore,noitalics]#[fg=#F3ECD9,bg=#6A5384,bold] #h "

# Window list
setw -g window-status-activity-style "underscore,fg=#66604F,bg=#F3ECD9"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#66604F,bg=#F3ECD9"
setw -g window-status-format "#[fg=#F3ECD9,bg=#F3ECD9]#[default] #I  #{b:pane_current_path} #[fg=#F3ECD9,bg=#F3ECD9,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#F3ECD9,bg=#E8DDC5]#[fg=#3A6E5F,bg=#E8DDC5] #I #[fg=#F3ECD9,bg=#3A6E5F] #{b:pane_current_path} #[fg=#3A6E5F,bg=#F3ECD9,nobold,nounderscore,noitalics]"
